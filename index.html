<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glam Arena Tech - Staff ID Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #090d16 0%, #152542 50%, #090d16 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: 'Inter', sans-serif;
      padding: 60px 20px;
    }

    .page-title {
      color: #94a3b8;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 40px;
      opacity: 0.8;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      text-align: center;
    }

    /* === CARDS GRID WRAPPER === */
    .cards-container {
      display: flex;
      flex-wrap: wrap;
      gap: 50px;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* === LANYARD & BADGE HOLDER === */
    .lanyard-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      filter: drop-shadow(0 30px 60px rgba(0,0,0,0.7));
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .lanyard-wrap:hover { transform: translateY(-10px) rotate(0.5deg); }

    .lanyard-strap {
      width: 20px;
      height: 80px;
      background: linear-gradient(90deg, #0a1b3a 0%, #1d4ed8 50%, #0a1b3a 100%);
      border-radius: 4px 4px 0 0;
      position: relative;
    }
    .lanyard-strap::after {
      content: '';
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 34px;
      height: 20px;
      background: #e2e8f0;
      border-radius: 6px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      border: 1px solid #94a3b8;
      z-index: 10;
    }

    /* Transparent Plastic Sleeve with premium reflections */
    .badge-holder {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 28px;
      padding: 16px;
      padding-top: 26px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: inset 0 20px 30px rgba(255,255,255,0.1), 0 10px 30px rgba(0,0,0,0.25);
    }
    .badge-holder::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.05) 100%);
      border-radius: 26px;
      pointer-events: none;
      z-index: 15;
    }
    /* Clip slot at the top of the sleeve */
    .holder-slot {
      width: 64px;
      height: 14px;
      background: rgba(15, 23, 42, 0.6);
      border-radius: 7px;
      margin-bottom: 18px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      position: relative;
    }
    .holder-slot::after {
      content: '';
      position: absolute;
      top: -12px; left: 50%;
      transform: translateX(-50%);
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #cbd5e1;
      border: 2px solid #94a3b8;
      z-index: 9;
    }

    /* === ID CARD === */
    .card {
      width: 330px;
      height: 510px;
      background: #ffffff;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
    }

    /* Tech dot matrix pattern watermark overlay */
    .card-tech-bg {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(0, 86, 179, 0.06) 1.5px, transparent 1.5px);
      background-size: 14px 14px;
      z-index: 2;
      pointer-events: none;
    }

    /* === HEADER: Logo === */
    .card-header {
      position: relative;
      z-index: 10;
      padding: 24px 24px 4px;
      display: flex;
      align-items: center;
    }
    .logo-img {
      height: 48px;
      width: auto;
      object-fit: contain;
    }

    /* === PHOTO === */
    .photo-wrap {
      position: relative;
      z-index: 5;
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }
    .photo-ring {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: #ffffff;
      padding: 5px;
      box-shadow: 0 10px 25px rgba(0, 86, 179, 0.25);
      border: 4px solid #0056b3;
      position: relative;
    }
    .photo-ring::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px dashed rgba(0, 136, 255, 0.35);
      animation: rotate-dashed 20s linear infinite;
    }
    @keyframes rotate-dashed {
      100% { transform: rotate(360deg); }
    }
    .photo-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: #f1f5f9;
      position: relative;
    }
    .photo-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }
    .placeholder-avatar {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      padding: 30px;
      background: #e2e8f0;
      stroke: #94a3b8;
    }

    /* === NAME & ROLE === */
    .card-name {
      position: relative;
      z-index: 5;
      text-align: center;
      margin-top: 20px;
      padding: 0 10px;
    }
    .card-name h2 {
      font-size: 24px;
      font-weight: 800;
      color: #0f1e36;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }
    .card-name .role {
      font-size: 14px;
      font-weight: 700;
      color: #0066cc;
      text-transform: uppercase;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* Thin blue divider line */
    .divider {
      position: relative;
      z-index: 5;
      width: 75%;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #0056b3, transparent);
      margin: 14px auto;
      opacity: 0.8;
    }

    /* === GOLD SMART CHIP === */
    .smart-chip-container {
      position: relative;
      z-index: 5;
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }
    .smart-chip {
      width: 42px;
      height: 32px;
      background: linear-gradient(135deg, #ffd700 0%, #e5b800 50%, #b28d00 100%);
      border-radius: 6px;
      border: 1px solid #aa7c11;
      position: relative;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.4), 0 2px 4px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .smart-chip::before {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px; background: rgba(0, 0, 0, 0.35);
    }
    .smart-chip::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0; left: 50%;
      width: 1px; background: rgba(0, 0, 0, 0.35);
    }
    .smart-chip-pattern {
      position: absolute;
      top: 4px; left: 8px; right: 8px; bottom: 4px;
      border-left: 1px solid rgba(0, 0, 0, 0.35);
      border-right: 1px solid rgba(0, 0, 0, 0.35);
      border-radius: 2px;
    }

    /* === ID NUMBER CAPSULE === */
    .id-capsule-container {
      position: relative;
      z-index: 5;
      display: flex;
      justify-content: center;
      margin-top: 4px;
    }
    .id-capsule {
      background: rgba(0, 86, 179, 0.05);
      border: 1.5px solid rgba(0, 86, 179, 0.25);
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .id-capsule svg {
      width: 16px;
      height: 16px;
      stroke: #0056b3;
      fill: none;
      stroke-width: 2.2;
    }
    .id-capsule .lbl {
      font-size: 12px;
      font-weight: 800;
      color: #64748b;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .id-capsule .val {
      font-size: 16px;
      font-weight: 800;
      color: #0f1e36;
      letter-spacing: 0.5px;
      font-family: 'Courier New', Courier, monospace;
    }

    /* === PRINT CARD BUTTON === */
    .print-card-btn {
      margin-top: 20px;
      padding: 10px 24px;
      background: linear-gradient(135deg, #0056b3 0%, #002d62 100%);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0, 86, 179, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 10;
    }
    .print-card-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0, 86, 179, 0.4);
    }

    /* === GLOBAL PRINT BUTTON === */
    .print-all-btn {
      margin-top: 50px;
      padding: 13px 40px;
      background: linear-gradient(135deg, #0056b3 0%, #002d62 100%);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0, 86, 179, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .print-all-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 86, 179, 0.5);
    }

    @media print {
      body { background: none !important; padding: 0 !important; }
      .page-title, .print-all-btn, .print-card-btn { display: none !important; }
      .lanyard-wrap { filter: none !important; margin-bottom: 40px; page-break-inside: avoid; }
      .badge-holder { border: none !important; background: none !important; padding: 0 !important; box-shadow: none !important; }
      .holder-slot { display: none !important; }
      
      /* Print mode behavior: print only one active card */
      body.is-printing .lanyard-wrap {
        display: none !important;
      }
      body.is-printing .lanyard-wrap.active-print {
        display: flex !important;
        margin: 0 auto !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>

  <button class="print-all-btn" onclick="window.print()">&#128438; Print All Cards</button>

  <script>
    function printSingleCard(btn) {
      const wrap = btn.closest('.lanyard-wrap');
      document.body.classList.add('is-printing');
      wrap.classList.add('active-print');
      window.print();
      
      const cleanUp = () => {
        document.body.classList.remove('is-printing');
        wrap.classList.remove('active-print');
      };
      
      window.onafterprint = cleanUp;
      setTimeout(cleanUp, 1500); // fallback
    }
  </script>

</body>
